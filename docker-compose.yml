# rpi-voice-agent / docker-compose.yml
# Stack: Ollama + Home Assistant + wyoming-openwakeword + wyoming-faster-whisper + VOICEVOX + Hermes Agent
# Tested on Raspberry Pi 5 (arm64) running Raspberry Pi OS Bookworm 64-bit
#
# Usage:
#   cp .env.example .env          # fill in secrets
#   bash setup.sh                 # Raspberry Pi 5
#   bash setup.sh --mac           # Mac (Apple Silicon) 開発検証
#   docker compose up -d          # start all services
#   docker compose logs -f        # tail logs

name: rpi-voice-agent

services:

  # ─────────────────────────────────────────────
  # 1. Ollama — local LLM inference (CPU / arm64)
  # ─────────────────────────────────────────────
  ollama:
    image: ollama/ollama:0.30.7
    container_name: ollama
    platform: linux/arm64
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-5m}
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-1}
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-1}
    # Pi 5 は GPU アクセラレーション非対応 → CPU のみ
    # 将来 GPU 対応 Pi/外部GPU が使えるなら deploy.resources.reservations を追加
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────────
  # 2. Ollama model puller（初回のみ実行してモデルを落とす）
  # ─────────────────────────────────────────────
  ollama-pull:
    image: ollama/ollama:0.30.7
    container_name: ollama-pull
    platform: linux/arm64
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      sh -c "
        MODEL=${OLLAMA_DEFAULT_MODEL:-qwen2.5:3b} &&
        echo '=== Checking model: '\"$$MODEL\"' ===' &&
        if ollama list | grep -q \"$$MODEL\"; then
          echo '=== Model already exists, skipping pull ===';
        else
          echo '=== Pulling model: '\"$$MODEL\"' ===' &&
          ollama pull \"$$MODEL\";
        fi &&
        echo '=== Done ==='
      "

  # ─────────────────────────────────────────────
  # 3. Home Assistant Core
  # ─────────────────────────────────────────────
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:2026.6.2
    container_name: homeassistant
    platform: linux/arm64
    restart: unless-stopped
    network_mode: host          # mDNS / デバイス検出に必要
    privileged: true
    volumes:
      - ./config/homeassistant:/config
      - /etc/localtime:/etc/localtime:ro
      - ${DBUS_RUN_DIR:-/run/dbus}:/run/dbus:ro
    environment:
      - TZ=${TZ:-Asia/Tokyo}
      - PULSE_SERVER=${PULSE_SERVER:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8123/"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─────────────────────────────────────────────
  # 4. wyoming-openwakeword（ウェイクワード検出）
  #    Wyoming プロトコルで HA と通信 → port 10400
  # ─────────────────────────────────────────────
  openwakeword:
    image: rhasspy/wyoming-openwakeword:2.1.0
    container_name: openwakeword
    platform: linux/arm64
    restart: unless-stopped
    ports:
      - "10400:10400"
    volumes:
      - ./config/openwakeword/custom_models:/custom
    command: >
      --uri tcp://0.0.0.0:10400
      --preload-model ${WAKE_WORD:-ok_nabu}
      --custom-model-dir /custom
      --debug
    environment:
      - TZ=${TZ:-Asia/Tokyo}
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.socket(); s.settimeout(3); s.connect(('localhost', 10400)); s.close()\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ─────────────────────────────────────────────
  # 5. wyoming-faster-whisper（音声 → テキスト STT）
  #    Wyoming プロトコルで HA と通信 → port 10300
  # ─────────────────────────────────────────────
  wyoming-whisper:
    image: rhasspy/wyoming-whisper:3.1.0
    container_name: wyoming-whisper
    platform: linux/arm64
    restart: unless-stopped
    ports:
      - "10300:10300"
    volumes:
      - whisper_data:/data
    command: >
      --uri tcp://0.0.0.0:10300
      --model ${WHISPER_MODEL:-tiny-int8}
      --language ${WHISPER_LANGUAGE:-ja}
      --beam-size 1
      --data-dir /data
    environment:
      - TZ=${TZ:-Asia/Tokyo}
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.socket(); s.settimeout(3); s.connect(('localhost', 10300)); s.close()\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 300s

  # ─────────────────────────────────────────────
  # 6. voicevox-engine（VOICEVOX HTTP API）
  #    日本語 TTS エンジン → port 50021 (内部)
  # ─────────────────────────────────────────────
  voicevox-engine:
    image: voicevox/voicevox_engine:cpu-0.26.0-dev
    container_name: voicevox-engine
    platform: linux/arm64
    restart: unless-stopped
    environment:
      - TZ=${TZ:-Asia/Tokyo}
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/50021' 2>/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ─────────────────────────────────────────────
  # 7. wyoming-voicevox（VOICEVOX → Wyoming アダプター）
  #    Wyoming プロトコルで HA と通信 → port 10200
  # ─────────────────────────────────────────────
  wyoming-voicevox:
    build:
      context: .
      dockerfile: wyoming-voicevox/Dockerfile
    container_name: wyoming-voicevox
    platform: linux/arm64
    restart: unless-stopped
    depends_on:
      voicevox-engine:
        condition: service_healthy
    ports:
      - "10200:10200"
    command: >
      --uri tcp://0.0.0.0:10200
      --voicevox-url http://voicevox-engine:50021
      --speaker ${VOICEVOX_SPEAKER:-3}
    environment:
      - TZ=${TZ:-Asia/Tokyo}
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.socket(); s.settimeout(3); s.connect(('localhost', 10200)); s.close()\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ─────────────────────────────────────────────
  # 7. Hermes Agent（自律エージェント）
  #    Ollama を LLM バックエンドとして使用
  # ─────────────────────────────────────────────
  hermes:
    image: nousresearch/hermes-agent:v2026.6.5
    container_name: hermes
    platform: linux/arm64
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "8642:8642"   # Hermes API / WebSocket
    volumes:
      - hermes_data:/opt/data
      - ./config/hermes:/opt/data/config:ro   # 設定ファイルをマウント
    environment:
      - TZ=${TZ:-Asia/Tokyo}
      # Ollama をプロバイダーとして指定
      - HERMES_LLM_PROVIDER=ollama
      - HERMES_LLM_BASE_URL=http://ollama:11434
      - HERMES_LLM_MODEL=${OLLAMA_DEFAULT_MODEL:-qwen2.5:3b}
      # API サーバー公開設定
      - API_SERVER_ENABLED=1
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_PORT=8642
      - API_SERVER_KEY=${HERMES_API_KEY}
      # タイムゾーン
      - HERMES_TIMEZONE=${TZ:-Asia/Tokyo}
    command: ["gateway", "run"]
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8642' 2>/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  # ─────────────────────────────────────────────
  # 8. wyoming-satellite（Mac 開発環境用音声サテライト）
  #    PulseAudio TCP 経由で Mac マイク/スピーカーを使用
  #    profiles: [mac] → setup.sh --mac 時のみ起動
  # ─────────────────────────────────────────────
  wyoming-satellite:
    build:
      context: .
      dockerfile: satellite/Dockerfile
    container_name: wyoming-satellite
    platform: linux/arm64
    profiles: [mac]
    restart: unless-stopped
    depends_on:
      openwakeword:
        condition: service_healthy
    ports:
      - "10700:10700"
    volumes:
      - ./sounds:/sounds:ro
    environment:
      - TZ=${TZ:-Asia/Tokyo}
      - PULSE_SERVER=${PULSE_SERVER:-tcp:host.docker.internal:4713}
    command: >
      python3 -m wyoming_satellite
      --name "kodamind"
      --uri tcp://0.0.0.0:10700
      --mic-command "arecord -D pulse -r 16000 -c 1 -f S16_LE -t raw -q"
      --snd-command "aplay -D pulse -r 24000 -c 1 -f S16_LE -t raw -q"
      --snd-command-rate 24000
      --snd-command-channels 1
      --snd-command-width 2
      --awake-wav /sounds/awake.wav
      --done-wav /sounds/done.wav
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.socket(); s.settimeout(3); s.connect(('localhost', 10700)); s.close()\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ─────────────────────────────────────────────
  # 9. setup — ワンショット初期化コンテナ
  #    HA オンボーディング・Wyoming Integration・
  #    Assist パイプライン作成を担う。
  #    将来の初期化処理はすべてここに追加する。
  # ─────────────────────────────────────────────
  setup:
    build:
      context: .
      dockerfile: setup/Dockerfile
    container_name: setup
    platform: linux/arm64
    restart: "no"
    network_mode: host          # localhost:8123 に到達するために必須
    depends_on:
      homeassistant:
        condition: service_healthy
      openwakeword:
        condition: service_healthy
      wyoming-whisper:
        condition: service_healthy
      wyoming-voicevox:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
    volumes:
      - ./scripts:/scripts:ro   # ha-setup.sh / ha-pipeline-setup.py
      - ./config:/config        # 将来の設定ファイル操作に備えて書き込み可
    environment:
      - HA_URL=http://localhost:8123
      - HA_USERNAME=${HA_USERNAME:-admin}
      - HA_PASSWORD=${HA_PASSWORD}
      - HA_DISPLAY_NAME=${HA_DISPLAY_NAME:-Admin}
      - HERMES_API_KEY=${HERMES_API_KEY}
      - HERMES_URL=http://localhost:8642
      - WAKE_WORD=${WAKE_WORD:-ok_nabu}
      - WHISPER_LANGUAGE=${WHISPER_LANGUAGE:-ja}
      - TTS_VOICE=${TTS_VOICE:-ja_JP-voicevox}
      - OLLAMA_DEFAULT_MODEL=${OLLAMA_DEFAULT_MODEL:-qwen2.5:3b}
      - TZ=${TZ:-Asia/Tokyo}
    entrypoint: ["bash", "/scripts/ha-setup.sh"]

# ─────────────────────────────────────────────
# Named volumes
# ─────────────────────────────────────────────
volumes:
  ollama_data:
    driver: local
  whisper_data:
    driver: local
  hermes_data:
    driver: local
