# rpi-voice-agent / docker-compose.yml
# Stack: Ollama + Home Assistant + wyoming-openwakeword + wyoming-faster-whisper + wyoming-piper + Hermes Agent
# Tested on Raspberry Pi 5 (arm64) running Raspberry Pi OS Bookworm 64-bit
#
# Usage:
#   cp .env.example .env          # fill in secrets
#   docker compose up -d          # start all services
#   docker compose logs -f        # tail logs

name: rpi-voice-agent

services:

  # ─────────────────────────────────────────────
  # 1. Ollama — local LLM inference (CPU / arm64)
  # ─────────────────────────────────────────────
  ollama:
    image: ollama/ollama:0.30.7
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-5m}
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-1}
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-1}
    # Pi 5 は GPU アクセラレーション非対応 → CPU のみ
    # 将来 GPU 対応 Pi/外部GPU が使えるなら deploy.resources.reservations を追加
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────────
  # 2. Ollama model puller（初回のみ実行してモデルを落とす）
  # ─────────────────────────────────────────────
  ollama-pull:
    image: ollama/ollama:0.30.7
    container_name: ollama-pull
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      sh -c "
        echo '=== Pulling default model: ${OLLAMA_DEFAULT_MODEL:-qwen2.5:3b} ===' &&
        ollama pull ${OLLAMA_DEFAULT_MODEL:-qwen2.5:3b} &&
        echo '=== Done ==='
      "

  # ─────────────────────────────────────────────
  # 3. Home Assistant Core
  # ─────────────────────────────────────────────
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:2026.6.2
    container_name: homeassistant
    restart: unless-stopped
    network_mode: host          # mDNS / デバイス検出に必要
    privileged: true
    volumes:
      - ./config/homeassistant:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
    environment:
      - TZ=${TZ:-Asia/Tokyo}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8123/"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─────────────────────────────────────────────
  # 4. wyoming-openwakeword（ウェイクワード検出）
  #    Wyoming プロトコルで HA と通信 → port 10400
  # ─────────────────────────────────────────────
  openwakeword:
    image: rhasspy/wyoming-openwakeword:2.1.0
    container_name: openwakeword
    restart: unless-stopped
    ports:
      - "10400:10400"
    volumes:
      - ./config/openwakeword/custom_models:/custom
    command: >
      --uri tcp://0.0.0.0:10400
      --preload-model ${WAKE_WORD:-ok_nabu}
      --custom-model-dir /custom
      --debug
    environment:
      - TZ=${TZ:-Asia/Tokyo}
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "10400"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ─────────────────────────────────────────────
  # 5. wyoming-faster-whisper（音声 → テキスト STT）
  #    Wyoming プロトコルで HA と通信 → port 10300
  # ─────────────────────────────────────────────
  wyoming-whisper:
    image: rhasspy/wyoming-faster-whisper:3.1.0
    container_name: wyoming-whisper
    restart: unless-stopped
    ports:
      - "10300:10300"
    volumes:
      - whisper_data:/data
    command: >
      --uri tcp://0.0.0.0:10300
      --model ${WHISPER_MODEL:-tiny-int8}
      --language ${WHISPER_LANGUAGE:-ja}
      --beam-size 1
      --download-dir /data
    environment:
      - TZ=${TZ:-Asia/Tokyo}
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "10300"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  # ─────────────────────────────────────────────
  # 6. wyoming-piper（テキスト → 音声 TTS）
  #    Wyoming プロトコルで HA と通信 → port 10200
  # ─────────────────────────────────────────────
  wyoming-piper:
    image: rhasspy/wyoming-piper:2.2.2
    container_name: wyoming-piper
    restart: unless-stopped
    ports:
      - "10200:10200"
    volumes:
      - piper_data:/data
    command: >
      --uri tcp://0.0.0.0:10200
      --voice ${PIPER_VOICE:-ja_JP-takumi-medium}
      --download-dir /data
    environment:
      - TZ=${TZ:-Asia/Tokyo}
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "10200"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  # ─────────────────────────────────────────────
  # 7. Hermes Agent（自律エージェント）
  #    Ollama を LLM バックエンドとして使用
  # ─────────────────────────────────────────────
  hermes:
    image: nousresearch/hermes-agent:v2026.6.5
    container_name: hermes
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "8642:8642"   # Hermes API / WebSocket
    volumes:
      - hermes_data:/opt/data
      - ./config/hermes:/opt/data/config:ro   # 設定ファイルをマウント
    environment:
      - TZ=${TZ:-Asia/Tokyo}
      # Ollama をプロバイダーとして指定
      - HERMES_LLM_PROVIDER=ollama
      - HERMES_LLM_BASE_URL=http://ollama:11434
      - HERMES_LLM_MODEL=${OLLAMA_DEFAULT_MODEL:-qwen2.5:3b}
      # API サーバー公開設定
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_PORT=8642
      - API_SERVER_KEY=${HERMES_API_KEY}
      # タイムゾーン
      - HERMES_TIMEZONE=${TZ:-Asia/Tokyo}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8642/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  # ─────────────────────────────────────────────
  # 8. setup — ワンショット初期化コンテナ
  #    HA オンボーディング・Wyoming Integration・
  #    Assist パイプライン作成を担う。
  #    将来の初期化処理はすべてここに追加する。
  # ─────────────────────────────────────────────
  setup:
    build:
      context: .
      dockerfile: setup/Dockerfile
    container_name: setup
    restart: "no"
    network_mode: host          # localhost:8123 に到達するために必須
    depends_on:
      homeassistant:
        condition: service_healthy
      openwakeword:
        condition: service_healthy
      wyoming-whisper:
        condition: service_healthy
      wyoming-piper:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
    volumes:
      - ./scripts:/scripts:ro   # ha-setup.sh / ha-pipeline-setup.py
      - ./config:/config        # 将来の設定ファイル操作に備えて書き込み可
    environment:
      - HA_URL=http://localhost:8123
      - HA_USERNAME=${HA_USERNAME:-admin}
      - HA_PASSWORD=${HA_PASSWORD}
      - HA_DISPLAY_NAME=${HA_DISPLAY_NAME:-Admin}
      - HERMES_API_KEY=${HERMES_API_KEY}
      - HERMES_URL=http://localhost:8642
      - WAKE_WORD=${WAKE_WORD:-ok_nabu}
      - WHISPER_LANGUAGE=${WHISPER_LANGUAGE:-ja}
      - PIPER_VOICE=${PIPER_VOICE:-ja_JP-takumi-medium}
      - TZ=${TZ:-Asia/Tokyo}
    entrypoint: ["bash", "/scripts/ha-setup.sh"]

# ─────────────────────────────────────────────
# Named volumes
# ─────────────────────────────────────────────
volumes:
  ollama_data:
    driver: local
  whisper_data:
    driver: local
  piper_data:
    driver: local
  hermes_data:
    driver: local
